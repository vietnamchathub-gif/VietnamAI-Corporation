<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tuyển Dụng</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
</head>
<body>

<h2>Nộp Đơn Tuyển Dụng</h2>

<input id="name" placeholder="Họ tên"><br><br>
<input id="age" placeholder="Tuổi"><br><br>
<input id="contact" placeholder="Liên hệ"><br><br>
<input id="exp" placeholder="Kinh nghiệm"><br><br>
<textarea id="reason" placeholder="Lý do ứng tuyển"></textarea><br><br>

<button onclick="submitApplication()">Gửi đơn</button>

<script>
const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT_ID.firebaseapp.com",
  databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function submitApplication() {

  const user = auth.currentUser;
  if (!user) {
    alert("Vui lòng đăng nhập trước");
    return;
  }

  db.ref("applications").push({
    uid: user.uid,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    contact: document.getElementById("contact").value,
    exp: document.getElementById("exp").value,
    reason: document.getElementById("reason").value,
    status: "pending",
    createdAt: Date.now()
  });

  alert("Đã gửi đơn thành công");
}
</script>

</body>
</html>
