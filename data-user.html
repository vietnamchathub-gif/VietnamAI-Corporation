.<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DATA USER SYSTEM</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      background:black;
      color:white;
      font-family:Arial;
      padding:20px;
    }
    .user{
      background:#111;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>🔒 DATA USER SYSTEM</h2>
<div id="list">Loading...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("users").once("value", function(snapshot) {

  const data = snapshot.val();
  const list = document.getElementById("list");

  if (!data || Object.keys(data).length === 0) {
    list.innerHTML = "Không có user";
    return;
  }

  let html = `
  <table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;color:white">
  <tr>
    <th>UID</th>
    <th>Name</th>
    <th>Username</th>
    <th>Premium</th>
    <th>Banned</th>
    <th>Created</th>
  </tr>
  `;

  Object.keys(data).forEach(uid => {
    const u = data[uid];

    html += `
    <tr>
      <td>${uid}</td>
      <td>${u.name || ""}</td>
      <td>${u.username || ""}</td>
      <td>${u.premium || false}</td>
      <td>
  ${u.banned || false}
  ${u.banned ? `<button onclick="unbanUser('${uid}')">Mở khóa</button>` : ""}
</td>
      <td>${u.created || ""}</td>
    </tr>
    `;
  });

  html += "</table>";
  list.innerHTML = html;

}, function(error){
  document.getElementById("list").innerHTML = "Lỗi: " + error.message;
});
  function unbanUser(uid){
  db.ref("users/" + uid + "/banned").set(false)
  .then(()=>{
    alert("Đã mở khóa");
    location.reload();
  })
  .catch(error=>{
    alert("Lỗi: " + error.message);
  });
  }
</script>

</body>
</html>
