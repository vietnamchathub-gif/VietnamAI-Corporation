<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;margin:0}
input,button{padding:8px;margin:5px;border-radius:5px;border:none}
button{cursor:pointer}
.teamBtn{display:block;width:90%;margin:5px auto;background:#1e3c72;color:white}
.chatBox{height:200px;overflow:auto;background:white;color:black;margin:10px}
.adminBox{background:#132d63;padding:10px;margin:10px;border-radius:10px}
.backBtn{background:orange}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<!-- AUTH -->
<div id="authSection">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
<button onclick="adminCreateAccount()">TẠO TÀI KHOẢN</button>
</div>

<!-- APP -->
<div id="appSection" style="display:none">

<button onclick="logout()">Đăng xuất</button>

<div id="teamList"></div>

<div id="chatSection" style="display:none">
<button class="backBtn" onclick="back()">← Back</button>
<h3 id="teamTitle"></h3>
<div class="chatBox" id="chatBox"></div>
<input id="msgInput" placeholder="Nhập tin nhắn">
<button onclick="sendMsg()">Gửi</button>
</div>

<div id="adminPanel" class="adminBox" style="display:none">
<h3>🛡 ADMIN PANEL</h3>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "THAY_CONFIG",
authDomain: "THAY",
databaseURL: "THAY",
projectId: "THAY",
storageBucket: "THAY",
messagingSenderId: "THAY",
appId: "THAY"
};

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let currentTeam = null;

/* AUTH */

window.register = () => {
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(()=>alert("Đăng ký thành công"))
.catch(e=>alert(e.message));
};

window.login = () => {
signInWithEmailAndPassword(auth,email.value,password.value)
.then(()=>alert("Đăng nhập thành công"))
.catch(e=>alert(e.message));
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,user=>{
if(user){
authSection.style.display="none";
appSection.style.display="block";

if(user.uid === ADMIN_UID){
adminPanel.style.display="block";
}

loadTeams();
}else{
authSection.style.display="block";
appSection.style.display="none";
}
});

/* TEAM */

function loadTeams(){
teamList.innerHTML="";
for(let i=1;i<=20;i++){
let btn=document.createElement("button");
btn.className="teamBtn";
btn.innerText="Đội "+i;
btn.onclick=()=>openTeam("team"+i);
teamList.appendChild(btn);
}
}

window.openTeam = (team)=>{
currentTeam=team;
teamList.style.display="none";
chatSection.style.display="block";
teamTitle.innerText=team;

onValue(ref(db,"messages/"+team),snap=>{
chatBox.innerHTML="";
snap.forEach(child=>{
let data=child.val();

let name = data.email;
if(data.uid === ADMIN_UID){
name="🔱 ADMIN";
}

chatBox.innerHTML += `<div><b>${name}</b>: ${data.text}</div>`;
});
});
};

window.back=()=>{
chatSection.style.display="none";
teamList.style.display="block";
};

window.sendMsg=()=>{
push(ref(db,"messages/"+currentTeam),{
email:auth.currentUser.email,
uid:auth.currentUser.uid,
text:msgInput.value
});
msgInput.value="";
};

/* ADMIN CREATE ACCOUNT */

window.adminCreateAccount = () => {

if(!auth.currentUser || auth.currentUser.uid !== ADMIN_UID){
alert("Chỉ ADMIN mới được tạo tài khoản");
return;
}

let newEmail = prompt("Email tài khoản mới:");
let newPass = prompt("Mật khẩu:");

if(!newEmail || !newPass) return;

createUserWithEmailAndPassword(auth,newEmail,newPass)
.then(()=>alert("Đã tạo tài khoản"))
.catch(e=>alert(e.message));
};

</script>

</body>
</html>
