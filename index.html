<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0b2c6b;color:white;text-align:center}
input{padding:8px;margin:5px;width:80%}
button{padding:8px 15px;margin:5px}
.teamBtn{display:block;width:90%;margin:10px auto;padding:10px;background:#fff;color:#000;border:none;border-radius:5px}
#messages{background:#fff;color:#000;height:250px;overflow:auto;margin:10px;padding:10px}
.adminBox{background:#08204d;padding:10px;margin-top:15px;border-radius:10px}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<div id="authSection">
<input id="name" placeholder="Tên hiển thị"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="appSection" style="display:none">
<h3>Danh sách 20 đội</h3>
<div id="teamList"></div>
<div id="adminPanel" style="display:none" class="adminBox">
<h3>🛡 ADMIN PANEL</h3>
<p>Bạn đang đăng nhập với quyền Admin</p>
</div>
<button onclick="logout()">Đăng xuất</button>
</div>

<div id="teamSection" style="display:none">
<button onclick="back()">← Quay lại</button>
<h3 id="teamTitle"></h3>
<div id="messages"></div>
<input id="msgInput" placeholder="Nhập tin nhắn...">
<button onclick="sendMsg()">Gửi</button>
</div>

<script>

// ===== ADMIN UID =====
const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

// ===== FIREBASE CONFIG (CONFIG THẬT CỦA MÀY) =====
const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentTeam = null;

// ===== REGISTER =====
function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>alert("Đăng ký thành công"))
  .catch(e=>alert(e.message));
}

// ===== LOGIN =====
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

// ===== AUTH STATE =====
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("authSection").style.display="none";
    document.getElementById("appSection").style.display="block";

    if(user.uid === ADMIN_UID){
      document.getElementById("adminPanel").style.display="block";
    }

    loadTeams();
  }else{
    document.getElementById("authSection").style.display="block";
    document.getElementById("appSection").style.display="none";
    document.getElementById("teamSection").style.display="none";
  }
});

// ===== LOAD 20 TEAMS =====
function loadTeams(){
  const list = document.getElementById("teamList");
  list.innerHTML="";
  for(let i=1;i<=20;i++){
    list.innerHTML+=`<button class="teamBtn" onclick="enterTeam(${i})">Đội ${i}</button>`;
  }
}

function enterTeam(num){
  currentTeam = num;
  document.getElementById("appSection").style.display="none";
  document.getElementById("teamSection").style.display="block";
  document.getElementById("teamTitle").innerText="Đội "+num;
  loadMessages();
}

function back(){
  document.getElementById("teamSection").style.display="none";
  document.getElementById("appSection").style.display="block";
}

// ===== SEND MESSAGE =====
function sendMsg(){
  const msg = document.getElementById("msgInput").value;
  const user = auth.currentUser;
  if(!msg) return;

  db.ref("teams/team"+currentTeam).push({
    sender:user.email,
    message:msg,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
}

// ===== LOAD MESSAGES =====
function loadMessages(){
  const msgBox = document.getElementById("messages");
  msgBox.innerHTML="";

  db.ref("teams/team"+currentTeam).off();
  db.ref("teams/team"+currentTeam).on("child_added",snapshot=>{
    const data = snapshot.val();
    msgBox.innerHTML+=`<div><b>${data.sender}:</b> ${data.message}</div>`;
    msgBox.scrollTop = msgBox.scrollHeight;
  });
}

</script>
</body>
</html>
