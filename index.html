<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0b2c6b;color:white;text-align:center}
input{padding:8px;margin:5px;width:80%}
button{padding:8px 15px;margin:5px}
.teamBtn{display:block;width:90%;margin:10px auto;padding:10px;background:#fff;color:#000;border:none;border-radius:5px}
#messages{background:#fff;color:#000;height:220px;overflow:auto;margin:10px;padding:10px}
.adminBox{background:#08204d;padding:10px;margin-top:15px;border-radius:10px}
.userRow{background:white;color:black;margin:5px;padding:5px;border-radius:5px}
.backBtn{background:#fff;color:#000;border:none;padding:6px 12px;border-radius:5px}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<!-- AUTH -->
<div id="authSection">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
<button onclick="resetPassword()">Quên mật khẩu</button>
</div>

<!-- MAIN -->
<div id="appSection" style="display:none">
<h3>Danh sách 20 đội</h3>
<div id="teamList"></div>

<div id="adminPanel" style="display:none" class="adminBox">
<h3>🛡 ADMIN PANEL</h3>
<div id="userList"></div>
</div>

<button onclick="logout()">Đăng xuất</button>
</div>

<!-- TEAM -->
<div id="teamSection" style="display:none">
<button class="backBtn" onclick="back()">← Back</button>
<h3 id="teamTitle"></h3>
<div id="messages"></div>
<input id="msgInput" placeholder="Nhập tin nhắn...">
<button onclick="sendMsg()">Gửi</button>
</div>

<script>

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentTeam = null;

function register(){
  const email = email.value;
  const password = password.value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(user=>{
    db.ref("users/"+user.user.uid).set({
      email:email,
      banned:false
    });
    alert("Đăng ký thành công");
  })
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function resetPassword(){
  if(!email.value){alert("Nhập email");return;}
  auth.sendPasswordResetEmail(email.value)
  .then(()=>alert("Đã gửi email reset"))
  .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  if(user){

    db.ref("users/"+user.uid).once("value").then(snap=>{
      if(snap.val() && snap.val().banned){
        alert("Tài khoản đã bị BAN");
        logout();
      }
    });

    authSection.style.display="none";
    appSection.style.display="block";

    if(user.uid === ADMIN_UID){
      adminPanel.style.display="block";
      loadUsers();
    }

    loadTeams();
  }else{
    authSection.style.display="block";
    appSection.style.display="none";
    teamSection.style.display="none";
  }
});

function loadTeams(){
  teamList.innerHTML="";
  for(let i=1;i<=20;i++){
    teamList.innerHTML+=`<button class="teamBtn" onclick="enterTeam(${i})">Đội ${i}</button>`;
  }
}

function enterTeam(num){
  currentTeam=num;
  appSection.style.display="none";
  teamSection.style.display="block";
  teamTitle.innerText="Đội "+num;
  loadMessages();
}

function back(){
  teamSection.style.display="none";
  appSection.style.display="block";
}

function sendMsg(){
  const user=auth.currentUser;
  if(!msgInput.value)return;

  db.ref("teams/team"+currentTeam).push({
    sender:user.email,
    uid:user.uid,
    message:msgInput.value,
    time:Date.now()
  });

  msgInput.value="";
}

function loadMessages(){
  messages.innerHTML="";
  db.ref("teams/team"+currentTeam).off();
  db.ref("teams/team"+currentTeam).on("child_added",snap=>{
    const data=snap.val();
    messages.innerHTML+=`
      <div>
        <b>${data.sender}:</b> ${data.message}
        ${auth.currentUser.uid===ADMIN_UID ?
          `<button onclick="kickUser('${data.uid}')">KICK</button>` : ``}
      </div>`;
    messages.scrollTop=messages.scrollHeight;
  });
}

function kickUser(uid){
  db.ref("teams/team"+currentTeam).once("value").then(snap=>{
    snap.forEach(child=>{
      if(child.val().uid===uid){
        db.ref("teams/team"+currentTeam+"/"+child.key).remove();
      }
    });
  });
}

function loadUsers(){
  userList.innerHTML="";
  db.ref("users").on("value",snap=>{
    userList.innerHTML="";
    snap.forEach(child=>{
      const uid=child.key;
      const data=child.val();
      userList.innerHTML+=`
        <div class="userRow">
          ${data.email}
          <button onclick="banUser('${uid}')">BAN</button>
        </div>`;
    });
  });
}

function banUser(uid){
  db.ref("users/"+uid+"/banned").set(true);
  alert("Đã BAN user");
}

</script>
</body>
</html>
