<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top 🇻🇳 *❗️Được phát hành, phát triển bởi Cộng Đồng Vietnam Chat Hub*</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:white}
#auth,#main{padding:20px}
input,button,select{padding:8px;margin:5px}
button{cursor:pointer}
#chatBox{height:250px;overflow-y:auto;background:#222;padding:10px;margin-top:10px}
.msg{margin:5px 0}
.admin{color:gold}
.premium{background:red;padding:10px;margin-top:10px}
#adminPanel{background:#222;padding:15px;margin-top:20px}
</style>
</head>
<body>

<div id="auth">
<h2>Đăng nhập / Đăng ký</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="main" style="display:none;">
<h2>Vietnam Chat Hub</h2>
<button onclick="logout()">Đăng xuất</button>

<div class="premium">
🔥 Premium [ĐẶC QUYỀN] — Chưa mở bán
</div>

<h3>Chọn Team</h3>
<select id="teamSelect" onchange="changeTeam()">
<option value="Red">Red</option>
<option value="Blue">Blue</option>
<option value="Gold">Gold</option>
</select>

<h3>Chat</h3>
<div id="chatBox"></div>
<input type="text" id="message" placeholder="Nhập tin nhắn">
<button onclick="sendMessage()">Gửi</button>

<div id="adminPanel" style="display:none;">
<h3>ADMIN PANEL</h3>

<h4>Auto Ban Setup</h4>
<input type="text" id="banWord" placeholder="hack">
<input type="text" id="banReason" placeholder="Bạn đã vi phạm chính sách của ứng dụng VietnamOnTop">
<button onclick="setBan()">Lưu Auto Ban</button>

<h4>Auto Kick Setup</h4>
<input type="text" id="kickWord" placeholder="spam">
<input type="text" id="kickReason" placeholder="Bạn đã vi phạm chính sách của ứng dụng VietnamOnTop">
<button onclick="setKick()">Lưu Auto Kick</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

await setPersistence(auth, browserLocalPersistence);

const db = getDatabase(app);

let lastMessageTime = 0;

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const authDiv = document.getElementById("auth");
const mainDiv = document.getElementById("main");
const adminPanel = document.getElementById("adminPanel");
const chatBox = document.getElementById("chatBox");

window.register = async function(){

  const emailInput = document.querySelector("input[type='email']");
  const passwordInput = document.querySelector("input[type='password']");

  const email = emailInput.value.trim();
  const password = passwordInput.value;

  try{

    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    const user = userCredential.user;

    // GHI VÀO DATABASE NGAY LẬP TỨC
    await set(ref(db,"users/"+user.uid),{
      email:user.email,
      team:"Red",
      banned:false,
      role:user.uid===ADMIN_UID?"admin":"user",
      createdAt: Date.now()
    });

    alert("Đăng ký thành công");

  }catch(error){
    alert(error.message);
  }

}
 window.login = async function(){

  const emailInput = document.querySelector('input[type="email"]');
  const passwordInput = document.querySelector('input[type="password"]');

  const email = emailInput.value.trim();
const password = passwordInput.value;
  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("Đăng nhập thành công");
  }catch(error){
    alert(error.message);
  }

  }

window.logout = async function(){
  await signOut(auth);
}

onAuthStateChanged(auth, async(user)=>{
  if(user){
    authDiv.style.display="none";
    mainDiv.style.display="block";
    loadChat();

    if(user.uid===ADMIN_UID){
      adminPanel.style.display="block";
    }

    checkBan(user.uid);
    loadChat();
  }else{
    authDiv.style.display="block";
    mainDiv.style.display="none";
  }
});

async function checkBan(uid){
  const snap=await get(ref(db,"users/"+uid));
  if(snap.val().banned){
    alert(snap.val().banReason);
    await signOut(auth);
  }
}

window.changeTeam = async function(){
  const user=auth.currentUser;
  const team=document.getElementById("teamSelect").value;
  await set(ref(db,"users/"+user.uid+"/team"),team);
}

window.sendMessage = async function(){
  
  const now = Date.now();

  if (now - lastMessageTime < 2000) {
    alert("Gửi tin quá nhanh! Chờ 2 giây.");
    return;
  }

  lastMessageTime = now;

  const user=auth.currentUser;
  const text=document.getElementById("message").value;
  if(!text) return;

  const banSnap=await get(ref(db,"autoBan"));
  const kickSnap=await get(ref(db,"autoKick"));

  if(banSnap.exists()){
    if(text.includes(banSnap.val().word) && user.uid!==ADMIN_UID){
      await set(ref(db,"users/"+user.uid+"/banned"),true);
      await set(ref(db,"users/"+user.uid+"/banReason"),banSnap.val().reason);
      alert(banSnap.val().reason);
      await signOut(auth);
      return;
    }
  }

  if(kickSnap.exists()){
    if(text.includes(kickSnap.val().word) && user.uid!==ADMIN_UID){
      alert(kickSnap.val().reason);
      await signOut(auth);
      return;
    }
  }

  await push(ref(db,"chat"),{
    uid:user.uid,
    email:user.email,
    text:text,
    time:Date.now()
  });

  document.getElementById("message").value="";
}

function loadChat(){
  onValue(ref(db,"chat"),(snapshot)=>{
    chatBox.innerHTML="";
    snapshot.forEach(child=>{
      const msg=child.val();
      const div=document.createElement("div");
      div.className="msg";
      div.innerText=msg.email+": "+msg.text;
      chatBox.appendChild(div);
    });
  });
}

window.setBan = async function(){
  const word=document.getElementById("banWord").value;
  const reason=document.getElementById("banReason").value;
  await set(ref(db,"autoBan"),{word,reason});
  alert("Đã lưu Auto Ban");
}

window.setKick = async function(){
  const word=document.getElementById("kickWord").value;
  const reason=document.getElementById("kickReason").value;
  await set(ref(db,"autoKick"),{word,reason});
  alert("Đã lưu Auto Kick");
}

</script>
</body>
</html>
