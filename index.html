<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b3d91;color:white}
.header{background:red;padding:12px;text-align:center;font-weight:bold}
.section{padding:15px}
input{padding:8px;margin:5px 0}
button{padding:8px;border:none;border-radius:6px;margin-top:5px}
.team{background:white;color:black;padding:10px;margin:5px 0;border-radius:8px}
.admin{background:#092c66;padding:10px;margin-top:15px;border-radius:10px}
.back{background:white;color:black;position:absolute;left:10px;top:10px}
</style>
</head>
<body>

<div class="header">🇻🇳 Vietnam On Top 🇻🇳</div>

<div id="authSection" class="section">
<h3>Đăng ký / Đăng nhập</h3>
<input id="username" placeholder="Tên hiển thị"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="appSection" class="section" style="display:none"></div>
<div id="teamSection" class="section" style="display:none"></div>

<script>

const ADMIN_ID = "55VD4pQJIFu1fvacjl_wY2KBjzl2";

const firebaseConfig = {
apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
authDomain: "vietnamontop-77401.firebaseapp.com",
databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
projectId: "vietnamontop-77401",
storageBucket: "vietnamontop-77401.firebasestorage.app",
messagingSenderId: "89611948481",
appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function register(){
  const u = username.value;
  const e = email.value;
  const p = password.value;

  auth.createUserWithEmailAndPassword(e,p)
  .then(cred=>{
    db.ref("users/"+cred.user.uid).set({
      username:u,
      banned:false
    });
    alert("Đăng ký thành công");
  })
  .catch(err=>alert(err.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(err=>alert(err.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    db.ref("users/"+user.uid).once("value").then(snap=>{
      if(snap.val()?.banned){
        alert("🚫 Bạn đã vi phạm chính sách.");
        auth.signOut();
        return;
      }
      loadApp(user.uid);
    });
  } else {
    authSection.style.display="block";
    appSection.style.display="none";
    teamSection.style.display="none";
  }
});

function loadApp(uid){
  authSection.style.display="none";
  appSection.style.display="block";
  teamSection.style.display="none";

  db.ref("users/"+uid).once("value").then(snap=>{
    const data=snap.val();
    let tag = uid===ADMIN_ID?" 🛡":"";
    let idDisplay = uid===ADMIN_ID?"Administrator":uid;

    let html=`
    <h3>Hồ sơ</h3>
    Tên: ${data.username}${tag}<br>
    ID: ${idDisplay}<br>
    <button onclick="logout()">Đăng xuất</button>
    <hr>
    <h3>Danh sách Đội</h3>
    `;

    for(let i=1;i<=20;i++){
      html+=`<div class="team" onclick="enterTeam(${i})">Đội ${i}</div>`;
    }

    if(uid===ADMIN_ID){
      html+=`
      <div class="admin">
      <h3>🛡 ADMIN PANEL</h3>
      <button onclick="banUser()">Ban User</button>
      <button onclick="kickUser()">Kick User</button>
      </div>
      `;
    }

    appSection.innerHTML=html;
  });
}

function logout(){
  auth.signOut();
}

function enterTeam(num){
  appSection.style.display="none";
  teamSection.style.display="block";
  teamSection.innerHTML=`
  <button class="back" onclick="back()">← Back</button>
  <h2>🇻🇳 Đội ${num}</h2>
  <img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Flag_of_Vietnam.svg" width="120">
  `;
}

function back(){
  teamSection.style.display="none";
  appSection.style.display="block";
}

function banUser(){
  const uid=prompt("Nhập UID cần BAN:");
  if(!uid) return;
  if(uid===ADMIN_ID){alert("Không thể ban ADMIN");return;}
  db.ref("users/"+uid+"/banned").set(true);
  alert("Đã BAN UID: "+uid);
}

function kickUser(){
  const uid=prompt("Nhập UID cần KICK:");
  if(!uid) return;
  if(uid===ADMIN_ID){alert("Không thể kick ADMIN");return;}
  db.ref("kicks/"+uid).set(true);
  alert("Đã Kick UID: "+uid);
}

</script>
</body>
</html>
