<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;margin:0}
input,button{padding:8px;margin:5px;border-radius:5px;border:none}
button{cursor:pointer}
.teamBtn{display:block;width:90%;margin:5px auto;background:#1e3c72;color:white}
.chatBox{height:200px;overflow:auto;background:white;color:black;margin:10px;padding:5px}
.adminBox{background:#132d63;padding:15px;margin:10px;border-radius:10px}
.premiumBox{background:#132d63;padding:15px;margin:10px;border-radius:10px}
.backBtn{background:orange}
.buyBtn{background:red;color:white}
table{width:100%;background:white;color:black;border-collapse:collapse}
td,th{border:1px solid black;padding:4px;font-size:12px}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<div id="authSection">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="appSection" style="display:none">

<h3>Danh sách 20 đội</h3>
<div id="teamList"></div>

<div id="chatSection" style="display:none">
<button class="backBtn" onclick="back()">← Back</button>
<h3 id="teamTitle"></h3>
<div class="chatBox" id="chatBox"></div>
<input id="msgInput" placeholder="Nhập tin nhắn">
<button onclick="sendMsg()">Gửi</button>
</div>

<div class="premiumBox">
<h3>⭐ Premium</h3>
<p>Giá: 49.000đ / 30 ngày</p>
<button class="buyBtn" onclick="buyPremium()">Mua Premium</button>
</div>

<div id="adminPanel" class="adminBox" style="display:none">
<h3>🛡 ADMIN PANEL</h3>

<h4>Data User System</h4>
<table>
<thead>
<tr>
<th>UID</th>
<th>Email</th>
<th>Premium</th>
<th>Banned</th>
<th>Created</th>
</tr>
</thead>
<tbody id="userTableBody"></tbody>
</table>
</div>

<button onclick="logout()">Đăng xuất</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
authDomain: "vietnamontop-77401.firebaseapp.com",
databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
projectId: "vietnamontop-77401",
storageBucket: "vietnamontop-77401.firebasestorage.app",
messagingSenderId: "89611948481",
appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let currentTeam = null;

/* AUTH */

window.register = () => {
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(cred=>{
set(ref(db,"users/"+cred.user.uid),{
email: cred.user.email,
premium:false,
banned:false,
createdAt: Date.now()
});
})
.catch(e=>alert(e.message));
};

window.login = () => {
signInWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message));
};

window.logout = () => signOut(auth);

/* AUTH STATE */

onAuthStateChanged(auth,user=>{

if(!user){
authSection.style.display="block";
appSection.style.display="none";
return;
}

authSection.style.display="none";
appSection.style.display="block";

loadTeams();

/* CHECK BAN */
get(ref(db,"users/"+user.uid)).then(snap=>{
if(snap.exists() && snap.val().banned){
alert("Tài khoản đã bị BAN!");
signOut(auth);
}
});

/* ADMIN ONLY LOAD USERS */
if(user.uid === ADMIN_UID){
adminPanel.style.display="block";

onValue(ref(db,"users"),snap=>{
userTableBody.innerHTML="";
snap.forEach(child=>{
const data = child.val();
userTableBody.innerHTML += `
<tr>
<td>${child.key}</td>
<td>${data.email}</td>
<td>${data.premium}</td>
<td>${data.banned}</td>
<td>${new Date(data.createdAt).toLocaleDateString()}</td>
</tr>`;
});
});
}

});

/* TEAMS */

function loadTeams(){
teamList.innerHTML="";
for(let i=1;i<=20;i++){
let btn=document.createElement("button");
btn.className="teamBtn";
btn.innerText="Đội "+i;
btn.onclick=()=>openTeam("team"+i);
teamList.appendChild(btn);
}
}

window.openTeam = (team)=>{
currentTeam=team;
teamList.style.display="none";
chatSection.style.display="block";
teamTitle.innerText=team;

onValue(ref(db,"messages/"+team),snap=>{
chatBox.innerHTML="";
snap.forEach(child=>{
let data=child.val();
chatBox.innerHTML += `<div>${data.email}: ${data.text}</div>`;
});
});
};

window.back=()=>{
chatSection.style.display="none";
teamList.style.display="block";
};

window.sendMsg=()=>{
if(!msgInput.value) return;
push(ref(db,"messages/"+currentTeam),{
email:auth.currentUser.email,
uid:auth.currentUser.uid,
text:msgInput.value
});
msgInput.value="";
};

/* PREMIUM */

window.buyPremium=()=>{
set(ref(db,"users/"+auth.currentUser.uid+"/premium"),true);
alert("Đã kích hoạt Premium!");
};

</script>

</body>
</html>
