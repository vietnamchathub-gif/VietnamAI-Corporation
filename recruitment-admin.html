<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Tuyển Dụng</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
</head>
<body>

<h2>Danh sách ứng viên</h2>
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT_ID.firebaseapp.com",
  databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

/* =========================
   CHỈ ADMIN ĐƯỢC TRUY CẬP
========================= */
auth.onAuthStateChanged(user => {

  if (!user || user.uid !== ADMIN_UID) {
    alert("Không có quyền truy cập");
    window.location.href = "/";
    return;
  }

  loadApplications();
});

/* =========================
   LOAD DANH SÁCH HỒ SƠ
========================= */
function loadApplications() {

  db.ref("applications").on("value", snapshot => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(child => {

      const data = child.val();
      const key = child.key;

      list.innerHTML += `
        <div style="border:1px solid black;padding:10px;margin-bottom:10px;">
          <b>${data.name}</b><br>
          Tuổi: ${data.age}<br>
          Liên hệ: ${data.contact}<br>
          Kinh nghiệm: ${data.exp}<br>
          Lý do: ${data.reason}<br>
          Trạng thái: ${data.status}<br><br>
          <button onclick="approve('${key}', '${data.uid}')">Duyệt</button>
          <button onclick="removeApp('${key}', '${data.uid}')">Xoá</button>
        </div>
      `;
    });

  });
}

/* =========================
   DUYỆT → THÊM staffList
========================= */
function approve(key, uid) {

  // Thêm UID vào staffList
  db.ref("staffList/" + uid).set(true);

  // Xoá hồ sơ khỏi danh sách
  db.ref("applications/" + key).remove();

  alert("Đã duyệt & cấp quyền ⚙️");
}

/* =========================
   XOÁ HỒ SƠ
========================= */
function removeApp(key, uid) {

  // Gỡ staff nếu có
  db.ref("staffList/" + uid).remove();

  // Xoá hồ sơ
  db.ref("applications/" + key).remove();

  alert("Đã xoá hồ sơ");
}

</script>

</body>
</html>
