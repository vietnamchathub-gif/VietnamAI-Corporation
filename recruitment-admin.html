<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recruitment Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0f13;
  color: white;
}

header {
  background: #181a20;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 18px;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1c1f26;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 6px;
}

.card p {
  margin: 6px 0;
}

.status {
  font-weight: bold;
}

button {
  margin-top: 10px;
  margin-right: 5px;
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  color: white;
}

.approve { background: #16a34a; }
.reject  { background: #dc2626; }
.delete  { background: #6b7280; }

.approve:hover { background: #15803d; }
.reject:hover  { background: #b91c1c; }
.delete:hover  { background: #4b5563; }

.denied {
  text-align: center;
  margin-top: 50px;
  font-size: 20px;
  color: red;
}
</style>
</head>

<body>

<header>Recruitment Admin Panel</header>
<div class="container" id="content"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401"
};

firebase.initializeApp(firebaseConfig);

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const auth = firebase.auth();
const db = firebase.database();

auth.onAuthStateChanged(user => {

  if (!user || user.uid !== ADMIN_UID) {
    document.body.innerHTML = "<div class='denied'>ACCESS DENIED</div>";
    return;
  }

  db.ref("recruitment").on("value", snapshot => {

    const container = document.getElementById("content");
    container.innerHTML = "";

    if (!snapshot.exists()) {
      container.innerHTML = "No applications yet.";
      return;
    }

    snapshot.forEach(child => {
      const id = child.key;
      const data = child.val();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <p><b>UID:</b> ${data.uid}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Application:</b><br>${data.content}</p>
        <p class="status">Status: ${data.status}</p>
        <button class="approve" onclick="approve('${id}')">APPROVE</button>
        <button class="reject" onclick="reject('${id}')">REJECT</button>
        <button class="delete" onclick="removeApp('${id}')">DELETE</button>
      `;

      container.appendChild(div);
    });

  });

});

function approve(id) {
  db.ref("recruitment/" + id).update({ status: "approved" });
}

function reject(id) {
  db.ref("recruitment/" + id).update({ status: "rejected" });
}

function removeApp(id) {
  if (confirm("Delete this application?")) {
    db.ref("recruitment/" + id).remove();
  }
}
</script>

</body>
</html>
